<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .zone { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .hub { fill: #0f4c81; stroke: #082f49; stroke-width: 2; }
      .hubText { font: 700 18px Arial, sans-serif; fill: #ffffff; }
      .hubSmall { font: 400 13px Arial, sans-serif; fill: #e0f2fe; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475569; }
      .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .purple { fill: #fae8ff; stroke: #a21caf; stroke-width: 2; }
      .slate { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; }
      .red { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); }
      .arrowGreen { stroke: #16a34a; stroke-width: 4; fill: none; marker-end: url(#arrowGreen); }
      .arrowPurple { stroke: #a21caf; stroke-width: 3; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrowPurple); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#334155"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#2563eb"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#16a34a"/></marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#a21caf"/></marker>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <text x="70" y="70" class="title">Segmentacao, seguranca e governanca da arquitetura proposta</text>
  <text x="70" y="103" class="subtitle">O desenho recomendado separa zonas logicas, aplica QoS por classe, centraliza controles e deixa evidencias mensuraveis para fiscalizacao.</text>

  <rect x="70" y="155" width="420" height="690" rx="20" class="zone"/>
  <text x="105" y="195" class="label">Zonas nas unidades</text>
  <rect x="105" y="230" width="340" height="68" rx="12" class="blue"/>
  <text x="130" y="258" class="label">VRF / classe Critica</text>
  <text x="130" y="280" class="tiny">PJe, autenticacao, sistemas internos</text>
  <rect x="105" y="325" width="340" height="68" rx="12" class="green"/>
  <text x="130" y="353" class="label">VRF / classe Usuario</text>
  <text x="130" y="375" class="tiny">Estacoes, web, servicos externos</text>
  <rect x="105" y="420" width="340" height="68" rx="12" class="amber"/>
  <text x="130" y="448" class="label">VRF / classe Voz e Video</text>
  <text x="130" y="470" class="tiny">Jitter e latencia monitorados</text>
  <rect x="105" y="515" width="340" height="68" rx="12" class="purple"/>
  <text x="130" y="543" class="label">VRF / classe Gerencia</text>
  <text x="130" y="565" class="tiny">CPE, roteadores, logs, telemetria</text>
  <rect x="105" y="640" width="340" height="110" rx="12" class="slate"/>
  <text x="130" y="672" class="label">Politicas locais</text>
  <text x="130" y="700" class="small">Internet local bloqueada por padrao</text>
  <text x="130" y="724" class="small">Excecoes documentadas e auditaveis</text>

  <rect x="590" y="155" width="420" height="690" rx="20" class="zone"/>
  <text x="625" y="195" class="label">Controles no hub da Sede</text>
  <rect x="640" y="230" width="320" height="95" rx="16" class="hub"/>
  <text x="685" y="265" class="hubText">Borda redundante</text>
  <text x="685" y="292" class="hubSmall">Roteadores / CPEs em pares</text>
  <rect x="640" y="360" width="320" height="95" rx="16" class="hub"/>
  <text x="690" y="395" class="hubText">Firewall em HA</text>
  <text x="690" y="422" class="hubSmall">Inspecao, politicas e logs</text>
  <rect x="640" y="490" width="320" height="95" rx="16" class="hub"/>
  <text x="682" y="525" class="hubText">Roteamento controlado</text>
  <text x="682" y="552" class="hubSmall">BGP/OSPF, metricas e retorno</text>
  <rect x="640" y="620" width="320" height="95" rx="16" class="hub"/>
  <text x="696" y="655" class="hubText">QoS fim a fim</text>
  <text x="682" y="682" class="hubSmall">Filas, marcacao e descarte</text>

  <rect x="1110" y="155" width="420" height="690" rx="20" class="zone"/>
  <text x="1145" y="195" class="label">Governanca e evidencias</text>
  <rect x="1145" y="230" width="340" height="68" rx="12" class="green"/>
  <text x="1170" y="258" class="label">Monitoramento 24x7</text>
  <text x="1170" y="280" class="tiny">Disponibilidade, perda, jitter, latencia</text>
  <rect x="1145" y="325" width="340" height="68" rx="12" class="purple"/>
  <text x="1170" y="353" class="label">SIEM / logs / auditoria</text>
  <text x="1170" y="375" class="tiny">Eventos de rota, firewall, CPE e SLA</text>
  <rect x="1145" y="420" width="340" height="68" rx="12" class="amber"/>
  <text x="1170" y="448" class="label">Relatorio mensal</text>
  <text x="1170" y="470" class="tiny">SLA, chamados, RCA, glosas</text>
  <rect x="1145" y="515" width="340" height="68" rx="12" class="blue"/>
  <text x="1170" y="543" class="label">Teste periodico</text>
  <text x="1170" y="565" class="tiny">Failover, retorno e experiencia</text>
  <rect x="1145" y="640" width="340" height="110" rx="12" class="red"/>
  <text x="1170" y="672" class="label">Plano de crise</text>
  <text x="1170" y="700" class="small">Escalonamento tecnico</text>
  <text x="1170" y="724" class="small">Comunicacao institucional</text>

  <path class="arrowBlue" d="M445 265 C520 260, 560 255, 640 270"/>
  <path class="arrowGreen" d="M445 360 C520 360, 560 392, 640 405"/>
  <path class="arrow" d="M445 455 C520 465, 560 515, 640 535"/>
  <path class="arrowPurple" d="M445 550 C520 585, 560 655, 640 665"/>
  <path class="arrow" d="M960 275 C1030 260, 1080 250, 1145 265"/>
  <path class="arrowPurple" d="M960 405 C1030 395, 1080 355, 1145 360"/>
  <path class="arrow" d="M960 535 C1030 535, 1080 455, 1145 455"/>
  <path class="arrowBlue" d="M960 665 C1030 660, 1080 560, 1145 550"/>

  <rect x="100" y="880" width="1400" height="64" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="130" y="919" class="label">Resultado esperado: menos superficie exposta, melhor previsibilidade para trafego critico e fiscalizacao objetiva por indicadores.</text>
</svg>
